name: "Terragrunt Apply"

on:
  push:
    branches:
      - main
    paths:
      - 'modules/**'
      - 'environments/**'

concurrency:
  group: terragrunt-apply-dev
  cancel-in-progress: false

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

jobs:
  apply:
    name: "Terragrunt Apply - Dev"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: environments/dev

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: "Setup Terragrunt"
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: "0.68.9"

      - name: "Terragrunt Init"
        run: terragrunt run-all init --terragrunt-non-interactive

      - name: "Terragrunt Validate"
        run: terragrunt run-all validate --terragrunt-non-interactive

      - name: "Terragrunt Plan"
        run: terragrunt run-all plan --terragrunt-non-interactive

      - name: "Terragrunt Apply"
        run: terragrunt run-all apply --terragrunt-non-interactive -auto-approve